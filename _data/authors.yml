# Optional per-author overrides.
#
# This file is only needed for multi-author sites. A page can set
# `author: "Some Name"` in its front matter to use one of the entries below;
# otherwise the site falls back to the single author defined in `_config.yml`.
#
# This site is single-author, so the file is intentionally left empty.
# To add an author, follow the pattern:
#
# Jane Doe:
#   name   : "Jane Doe"
#   bio    : "Short bio."
#   avatar : "jane.jpg"   # placed in /images/
